<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<!--
  CSP for the blob iframe. Note: Obsidian's parent CSP applies to child frames,
  but inline content in a blob URL is not subject to it for script/style execution.
  img-src includes data: to allow Monaco's squiggle error decorations (inline SVGs).
  worker-src blob: allows Monaco's web workers (syntax checking, etc.).
-->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self' app:; script-src 'self' 'unsafe-eval' 'unsafe-inline' app:; style-src 'self' 'unsafe-inline' app:; img-src 'self' app: data:; worker-src blob:;"
		/>
		<style>
			html,
			body,
			#container {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
			}
		</style>
	</head>
	<body>
		<div id="container"></div>
		<!--
  require.paths.vs is patched to an absolute app:// URL by mountCodeEditor.ts before
  this HTML is injected as a blob URL, so ./vs resolves correctly.
-->
		<script>
			var require = { paths: { vs: './vs' } };
		</script>
		<script src="./vs/loader.js"></script>
		<script>
			require(['vs/editor/editor.main'], function () {
				var editor;
				var context;
				var formatOnSave = false;
				// Guard against applyParams being called twice (e.g. if 'init' arrives more than once)
				var initialized = false;

				function applyFormatterConfig(cfg) {
					var modelOpts = {};
					if (cfg.tabSize !== undefined) modelOpts.tabSize = cfg.tabSize;
					if (cfg.insertSpaces !== undefined) modelOpts.insertSpaces = cfg.insertSpaces;
					if (Object.keys(modelOpts).length) editor.getModel().updateOptions(modelOpts);
					formatOnSave = !!cfg.formatOnSave;
					var { tabSize, insertSpaces, formatOnSave: _fs, ...editorOpts } = cfg;
					editor.updateOptions(editorOpts);
				}

				function applyParams(params) {
					if (initialized) return;
					initialized = true;
					context = params.context;

					if (params.themeData) {
						try {
							monaco.editor.defineTheme(
								params.theme,
								JSON.parse(params.themeData)
							);
						} catch (e) {
							console.warn('code-files: defineTheme failed', e);
						}
					}

					var opts = {
						language: params.lang || 'plaintext',
						theme: params.theme || 'vs-dark',
						folding: params.folding !== false,
						lineNumbers: params.lineNumbers || 'on',
						minimap: { enabled: params.minimap !== false },
						wordWrap: params.wordWrap || 'off',
						// automaticLayout recomputes editor size when the container resizes
						automaticLayout: true
					};

					if (params.background === 'transparent') {
						document.body.style.background = 'transparent';
						document.documentElement.style.background = 'transparent';
					}

					if (params.javascriptDefaults === 'true') {
						monaco.languages.typescript.javascriptDefaults.setDiagnosticsOptions(
							{
								noSemanticValidation:
									params.javascriptDefaultsNoSemanticValidation ===
									'true',
								noSyntaxValidation:
									params.javascriptDefaultsNoSyntaxValidation === 'true'
							}
						);
					}
					if (params.typescriptDefaults === 'true') {
						monaco.languages.typescript.typescriptDefaults.setDiagnosticsOptions(
							{
								noSemanticValidation:
									params.typescriptDefaultsNoSemanticValidation ===
									'true',
								noSyntaxValidation:
									params.typescriptDefaultsNoSyntaxValidation === 'true'
							}
						);
					}

					editor = monaco.editor.create(
						document.getElementById('container'),
						opts
					);

					if (params.formatterConfig) {
						try { applyFormatterConfig(parseEditorConfig(params.formatterConfig)); }
						catch (e) { console.warn('code-files: invalid formatterConfig JSON', e); }
					}

					// Alt+Z toggles word wrap and persists the setting
					editor.addCommand(
						monaco.KeyMod.Alt | monaco.KeyCode.KeyZ,
						function () {
							var current = editor.getRawOptions().wordWrap;
							var next = current === 'on' ? 'off' : 'on';
							editor.updateOptions({ wordWrap: next });
							window.parent.postMessage(
								{
									type: 'word-wrap-toggled',
									wordWrap: next,
									context: context
								},
								'*'
							);
						}
					);

					editor.addAction({
						id: 'code-files-save',
						label: 'Save',
						keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS],
						run: function () {
							if (formatOnSave) {
								var formatAction = editor.getAction('editor.action.formatDocument');
								if (formatAction && formatAction.isSupported()) {
									formatAction.run().then(function () {
										window.parent.postMessage(
											{ type: 'save-document', context: context },
											'*'
										);
									});
									return;
								}
							}
							window.parent.postMessage(
								{ type: 'save-document', context: context },
								'*'
							);
						}
					});

					editor.onDidChangeModelContent(function () {
						// Send context along with the value so the parent can identify which editor changed
						window.parent.postMessage(
							{
								type: 'change',
								value: editor.getValue(),
								context: context
							},
							'*'
						);
					});

					// Add a context menu action in Monaco to open the formatter config for this file
					editor.addAction({
						id: 'code-files-rename-extension',
						label: '🍋‍🟩 Rename Extension',
						contextMenuGroupId: 'code-files',
						contextMenuOrder: 1,
						run: function () {
							window.parent.postMessage(
								{ type: 'open-rename-extension', context: context },
								'*'
							);
						}
					});

					editor.addAction({
						id: 'code-files-change-theme',
						label: '🍒 Change Theme',
						contextMenuGroupId: 'code-files',
						contextMenuOrder: 2,
						run: function () {
							window.parent.postMessage(
								{ type: 'open-theme-picker', context: context },
								'*'
							);
						}
					});

					editor.addAction({
						id: 'code-files-formatter-config',
						label: '📐 Formatter Config',
						contextMenuGroupId: 'code-files',
						contextMenuOrder: 3,
						run: function () {
							window.parent.postMessage(
								{ type: 'open-formatter-config', context: context },
								'*'
							);
						}
					});

					editor.addAction({
						id: 'code-files-obsidian-settings',
						label: '🔧 Obsidian Settings (Ctrl+,)',
						run: function () {
							window.parent.postMessage(
								{ type: 'open-settings', context: context },
								'*'
							);
						}
					});

					editor.addAction({
						id: 'code-files-obsidian-palette',
						label: '🎹 Obsidian Command Palette (Ctrl+P)',
						run: function () {
							window.parent.postMessage(
								{ type: 'open-obsidian-palette', context: context },
								'*'
							);
						}
					});

					// Ctrl+P opens Obsidian command palette
					editor.addCommand(
						monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyP,
						function () {
							window.parent.postMessage(
								{ type: 'open-obsidian-palette', context: context },
								'*'
							);
						}
					);

					// Ctrl+, opens Obsidian settings (intercepted before Monaco can consume it)
					editor.addCommand(
						monaco.KeyMod.CtrlCmd | monaco.KeyCode.Comma,
						function () {
							window.parent.postMessage(
								{ type: 'open-settings', context: context },
								'*'
							);
						}
					);
				}

				// Signal that Monaco is fully loaded and ready to receive 'init'.
				// This must fire before the message listener is set up — the parent
				// will respond with 'init' + 'get-languages' + 'change-value' in sequence.
				window.parent.postMessage({ type: 'ready' }, '*');

				window.addEventListener('message', function (e) {
					var data = e.data;
					if (!data || !data.type) return;

					switch (data.type) {
						case 'init':
							applyParams(data);
							break;
						case 'change-value':
							if (editor) editor.setValue(data.value || '');
							break;
						case 'change-language':
							if (editor)
								monaco.editor.setModelLanguage(
									editor.getModel(),
									data.language
								);
							break;
						case 'change-theme':
							if (editor) {
								if (data.themeData) {
									try {
										monaco.editor.defineTheme(
											data.theme,
											JSON.parse(data.themeData)
										);
									} catch (e) {
										console.warn('code-files: defineTheme failed', e);
									}
								}
								monaco.editor.setTheme(data.theme);
							}
							break;
						case 'change-editor-config':
							if (editor) {
								try { applyFormatterConfig(parseEditorConfig(data.config)); }
								catch (e) { console.warn('code-files: invalid formatterConfig JSON', e); }
							}
							break;
						case 'change-options':
							if (editor) {
								editor.updateOptions({
									wordWrap: data.wordWrap,
									lineNumbers: data.lineNumbers,
									minimap: { enabled: data.minimap },
									folding: data.folding
								});
								if (typeof data.noSemanticValidation === 'boolean') {
									monaco.languages.typescript.javascriptDefaults.setDiagnosticsOptions(
										{
											noSemanticValidation: data.noSemanticValidation,
											noSyntaxValidation: data.noSyntaxValidation
										}
									);
									monaco.languages.typescript.typescriptDefaults.setDiagnosticsOptions(
										{
											noSemanticValidation: data.noSemanticValidation,
											noSyntaxValidation: data.noSyntaxValidation
										}
									);
								}
							}
							break;
						case 'change-word-wrap':
							if (editor) editor.updateOptions({ wordWrap: data.wordWrap });
							break;
						case 'change-background':
							document.body.style.background = data.background;
							document.documentElement.style.background = data.background;
							if (data.theme) monaco.editor.setTheme(data.theme);
							break;
						case 'get-languages':
							// Return all Monaco language registrations as [extension, languageId] pairs.
							// Extensions come with a leading dot (.js) which is stripped here.
							var langs = monaco.languages
								.getLanguages()
								.flatMap(function (lang) {
									return (lang.extensions || []).map(function (ext) {
										return [ext.replace('.', ''), lang.id];
									});
								});
							window.parent.postMessage(
								{ type: 'languages', langs: langs },
								'*'
							);
							break;
					}
				});
			});
		</script>
	</body>
</html>
