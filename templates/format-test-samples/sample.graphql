# GraphQL sample with formatting issues
type User{id:ID!
name:String!
email:String!
posts:[Post!]!
createdAt:String!}

type Post{id:ID!
title:String!
content:String!
author:User!
comments:[Comment!]!
publishedAt:String}

type Comment{id:ID!
text:String!
author:User!
post:Post!}

type Query{users:[User!]!
user(id:ID!):User
posts:[Post!]!
post(id:ID!):Post}

type Mutation{createUser(name:String!,email:String!):User!
createPost(title:String!,content:String!,authorId:ID!):Post!
createComment(text:String!,postId:ID!,authorId:ID!):Comment!}
